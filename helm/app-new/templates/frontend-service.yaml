apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-new.fullname" . }}-frontend
  labels:
    {{- include "app-new.labels" . | nindent 4 }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "app-new.selectorLabels" . | nindent 4 }}
---

