name: CI/CD Pipeline - ECR/EKS Deployment

on:
  push:
    branches: [ pipeline2 ]
  workflow_dispatch:

# ============================================
# Environment Variables
# ============================================
env:
  APP_NAME: app-new
  ECR_REPOSITORY: ${{ secrets.ECR_REPO_URI }}
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: helm/app-new
  AWS_REGION: us-east-1
  HELM_NAMESPACE: app-new
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  # ============================================
  # Step 1: Checkout
  # ============================================
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  # ============================================
  # Step 2: Set Variables
  # ============================================
  set-variables:
    runs-on: ubuntu-latest
    needs: checkout
    outputs:
      image_tag: ${{ steps.set-vars.outputs.image_tag }}
      short_sha: ${{ steps.set-vars.outputs.short_sha }}
    steps:
      - name: Set Variables
        id: set-vars
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "::set-output name=image_tag::${{ github.sha }}"
          echo "::set-output name=short_sha::${GITHUB_SHA:0:8}"
          echo "✅ Variables set:"
          echo "   - IMAGE_TAG: ${{ github.sha }}"
          echo "   - SHORT_SHA: ${GITHUB_SHA:0:8}"
          echo "   - APP_NAME: ${{ env.APP_NAME }}"
          echo "   - AWS_REGION: ${{ env.AWS_REGION }}"

  # ============================================
  # Step 3: Install Dependencies
  # ============================================
  install-dependencies:
    runs-on: ubuntu-latest
    needs: set-variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'app/**/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd app/backend
          npm ci
          echo "✅ Backend dependencies installed"

      - name: Install Frontend Dependencies
        run: |
          cd app/frontend
          npm ci
          echo "✅ Frontend dependencies installed"

      - name: Verify Installation
        run: |
          cd app/backend && npm list --depth=0
          cd app/frontend && npm list --depth=0
          echo "✅ All dependencies verified"

# ============================================
  # Step 4: SonarCloud Scan
  # ============================================
  sonar-scan:
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================
  # Step 5: Quality Gate Check
  # ============================================
  quality-gate:
    runs-on: ubuntu-latest
    needs: sonar-scan
    timeout-minutes: 20
    steps:
      - name: Wait for SonarCloud Quality Gate
        run: |
          echo "⏳ Waiting for SonarCloud Quality Gate..."
          for i in $(seq 1 15); do
            status=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/qualitygates/project_status?projectKey=jonnamohit_Terraform" | python3 -c 'import sys, json; print(json.load(sys.stdin)["projectStatus"]["status"])')
            echo "Quality gate status: $status"
            if [ "$status" = "OK" ]; then 
              echo "✅ Quality Gate passed!"
              exit 0
            fi
            if [ "$status" = "ERROR" ]; then 
              echo "❌ Quality Gate failed!"
              exit 1
            fi
            sleep 20
          done
          echo "❌ Timed out waiting for SonarCloud quality gate"
          exit 1

  # ============================================
  # Step 6: Install Tools
  # ============================================
  install-tools:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl
          kubectl version --client
          echo "✅ kubectl installed"

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version
          echo "✅ Helm installed"

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install
          aws --version
          echo "✅ AWS CLI installed"

  # ============================================
  # Step 7: Docker Build
  # Step 8: Image Scan
  # Step 9: Push to ECR
  # ============================================
  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: install-tools
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        id: build
        run: |
          docker build \
            --tag $ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REPOSITORY:latest \
            .
          echo "✅ Docker image built"
          docker images $ECR_REPOSITORY

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload Trivy SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push to ECR
        id: build-push
        run: |
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest
          echo "image_uri=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Image pushed to ECR: $ECR_REPOSITORY:$IMAGE_TAG"

  # ============================================
  # Step 10: EKS Connect
  # ============================================
  eks-connect:
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl config current-context
          echo "✅ Connected to EKS cluster: ${{ env.EKS_CLUSTER_NAME }}"

      - name: Verify EKS Connection
        run: |
          kubectl get nodes
          kubectl get ns

  # ============================================
  # Step 11: Helm Deploy
  # ============================================
  helm-deploy:
    runs-on: ubuntu-latest
    needs: eks-connect
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Helm
        run: |
          curl -LO https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz
          tar -zxf helm-v3.14.0-linux-amd64.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Helm Deploy to EKS
        run: |
          helm upgrade --install $APP_NAME $HELM_CHART_PATH \
            --namespace $HELM_NAMESPACE \
            --create-namespace \
            --set image.repository=${{ env.ECR_REPOSITORY }} \
            --set image.tag=$IMAGE_TAG \
            --set ingress.hosts[0].host=${{ secrets.APP_HOSTNAME }} \
            --wait \
            --timeout 5m \
            --atomic \
            --cleanup-on-fail
          echo "✅ Helm deployment complete"

      - name: Verify Deployment
        run: |
          kubectl get pods -n $HELM_NAMESPACE
          kubectl get svc -n $HELM_NAMESPACE
          kubectl get ingress -n $HELM_NAMESPACE

  # ============================================
  # Step 12: Smoke Test
  # ============================================
  smoke-test:
    runs-on: ubuntu-latest
    needs: helm-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Wait for pods to be ready
        run: |
          echo "⏳ Waiting for pods to be ready..."
          kubectl wait --for=condition=available \
            deployment/$APP_NAME \
            -n $HELM_NAMESPACE \
            --timeout=300s
          echo "✅ All pods are ready"

      - name: Check Pod Health
        run: |
          kubectl get pods -n $HELM_NAMESPACE -o wide
          kubectl describe pods -n $HELM_NAMESPACE | grep -E "Status:|Conditions:"

      - name: Check Service Endpoints
        run: |
          kubectl get endpoints -n $HELM_NAMESPACE

      - name: Test Application Response
        run: |
          sleep 10
          SERVICE=$(kubectl get svc $APP_NAME -n $HELM_NAMESPACE -o jsonpath='{.spec.type}')
          if [ "$SERVICE" = "LoadBalancer" ]; then
            EXTERNAL_IP=$(kubectl get svc $APP_NAME -n $HELM_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            echo "Testing LoadBalancer at: $EXTERNAL_IP"
            curl -s -o /dev/null -w "%{http_code}" http://$EXTERNAL_IP || echo "Service might be starting..."
          elif [ "$SERVICE" = "ClusterIP" ]; then
            CLUSTER_IP=$(kubectl get svc $APP_NAME -n $HELM_NAMESPACE -o jsonpath='{.spec.clusterIP}')
            echo "Testing ClusterIP at: $CLUSTER_IP"
            kubectl run curl-test --image=curlimages/curl --restart=Never --rm -it -- \
              curl -s -o /dev/null -w "%{http_code}" http://$CLUSTER_IP || echo "Service might be starting..."
          fi

      - name: Test Database Connection
        run: |
          kubectl exec -n $HELM_NAMESPACE \
            deploy/$APP_NAME -- \
            sh -c "ls -la /app/backend/data/ || echo 'Data directory accessed'"
          echo "✅ Application is responding"

      - name: Final Status Check
        run: |
          echo "=========================================="
          echo "🎉 SMOKE TEST PASSED!"
          echo "=========================================="
          echo "Pipeline Status:"
          echo "  ✅ Checkout"
          echo "  ✅ Set Variables"
          echo "  ✅ Install Dependencies"
          echo "  ✅ SonarCloud Scan"
          echo "  ✅ Quality Gate Check"
          echo "  ✅ Install Tools"
          echo "  ✅ Docker Build"
          echo "  ✅ Image Scan"
          echo "  ✅ Push to ECR"
          echo "  ✅ EKS Connect"
          echo "  ✅ Helm Deploy"
          echo "  ✅ Smoke Test"
          echo "=========================================="

  # ============================================
  # Failure Notification
  # ============================================
  notify-failure:
    runs-on: ubuntu-latest
    needs: [sonar-scan, quality-gate, docker-build-scan-push, helm-deploy, smoke-test]
    if: failure()
    steps:
      - name: Notify on Failure
        run: |
          echo "=========================================="
          echo "❌ PIPELINE FAILED!"
          echo "=========================================="
          echo "Failed job: ${{ github.job }}"
          echo "Reference: ${{ github.ref }}"
          echo "=========================================="
        shell: bash
