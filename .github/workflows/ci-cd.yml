name: CI/CD Pipeline - ECR/EKS Deployment

on:
  push:
    branches: [ pipeline2 ]

env:
  APP_NAME: app-new
  ECR_REPOSITORY: ${{ secrets.ECR_REPO_URI }}
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: helm/app-new
  AWS_REGION: us-east-1
  HELM_NAMESPACE: app-new
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  set-variables:
    runs-on: ubuntu-latest
    needs: checkout
    outputs:
      image_tag: ${{ steps.set-vars.outputs.image_tag }}
      short_sha: ${{ steps.set-vars.outputs.short_sha }}
    steps:
      - name: Set Variables
        id: set-vars
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    needs: set-variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'app/**/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd app/backend
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd app/frontend
          npm ci

  sonar-scan:
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    runs-on: ubuntu-latest
    needs: sonar-scan
    timeout-minutes: 20
    steps:
      - name: Wait for SonarCloud Quality Gate
        run: |
          echo "Waiting for SonarCloud Quality Gate..."
          for i in $(seq 1 15); do
            status=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/qualitygates/project_status?projectKey=jonnamohit_Terraform" | python3 -c 'import sys, json; print(json.load(sys.stdin)["projectStatus"]["status"])')
            if [ "$status" = "OK" ]; then 
              echo "Quality Gate passed!"
              exit 0
            fi
            if [ "$status" = "ERROR" ]; then 
              echo "Quality Gate failed!"
              exit 1
            fi
            sleep 20
          done

  install-tools:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install

  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: install-tools
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate ECR_REPOSITORY
        run: |
          if [ -z "${{ env.ECR_REPOSITORY }}" ]; then
            echo "ERROR: ECR_REPOSITORY is empty. Please set the ECR_REPO_URI secret in GitHub."
            exit 1
          fi

      - name: Build Docker Image
        id: build
        run: |
          docker build \
            --tag ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Upload Trivy SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push to ECR
        id: build-push
        run: |
          docker push ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REPOSITORY }}:latest
          echo "image_uri=${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  eks-connect:
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Verify EKS Connection
        run: |
          kubectl get nodes
          kubectl get ns

  helm-deploy:
    runs-on: ubuntu-latest
    needs: eks-connect
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Helm
        run: |
          curl -LO https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz
          tar -zxf helm-v3.14.0-linux-amd64.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Helm Deploy to EKS
        run: |
          helm upgrade --install ${{ env.APP_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set ingress.hosts[0].host=${{ secrets.APP_HOSTNAME }} \
            --wait \
            --timeout 5m \
            --atomic \
            --cleanup-on-fail

      - name: Verify Deployment
        run: |
          kubectl get pods -n ${{ env.HELM_NAMESPACE }}
          kubectl get svc -n ${{ env.HELM_NAMESPACE }}
          kubectl get ingress -n ${{ env.HELM_NAMESPACE }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: helm-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=available \
            deployment/${{ env.APP_NAME }} \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=300s

      - name: Check Pod Health
        run: |
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} -o wide

      - name: Check Service Endpoints
        run: |
          kubectl get endpoints -n ${{ env.HELM_NAMESPACE }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: [sonar-scan, quality-gate, docker-build-scan-push, helm-deploy, smoke-test]
    if: failure()
    steps:
      - name: Notify on Failure
        run: |
          echo "Pipeline failed!"
          echo "Failed job: ${{ github.job }}"
