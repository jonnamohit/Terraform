name: CI/CD Pipeline - ECR/EKS Deployment

on:
  push:
    branches: [ pipeline2 ]
  workflow_dispatch:

env:
  APP_NAME: app-new
  ECR_REPOSITORY: ${{ secrets.ECR_REPO_URI }}
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: helm/app-new
  AWS_REGION: ap-south-2
  HELM_NAMESPACE: app-new
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  set-variables:
    runs-on: ubuntu-latest
    needs: checkout
    outputs:
      image_tag: ${{ steps.set-vars.outputs.image_tag }}
    steps:
      - name: Set Variables
        id: set-vars
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    needs: set-variables
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: |
          cd app/backend
          npm ci

      - run: |
          cd app/frontend
          npm ci

  sonar-scan:
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=jonnamohit_Terraform
            -Dsonar.organization=jonnamohit
            -Dsonar.sources=app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - run: echo "Quality Gate Passed"

  install-tools:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: docker/setup-buildx-action@v3

  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: install-tools
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  eks-connect:
    runs-on: self-hosted
    needs: docker-build-scan-push
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl get nodes

  helm-deploy:
    runs-on: self-hosted
    needs: eks-connect
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          helm upgrade --install ${{ env.APP_NAME }} ${{ env.HELM_CHART_PATH }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: helm-deploy
    steps:
      - uses: actions/checkout@v4

      - run: echo "Smoke Test Passed"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [sonar-scan, docker-build-scan-push, helm-deploy]
    if: failure()
    steps:
      - run: echo "Pipeline failed"