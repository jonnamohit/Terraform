name: CI/CD Pipeline - ECR/EKS Deployment

on:
  push:
    branches: [ pipeline2 ]
  workflow_dispatch:

env:
  APP_NAME: app-new
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: helm/app-new
  AWS_REGION: ap-south-2
  HELM_NAMESPACE: app-new
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  set-variables:
    runs-on: ubuntu-latest
    needs: checkout
    outputs:
      account_id: ${{ steps.set-vars.outputs.account_id }}
    steps:
      - name: Set Variables
        id: set-vars
        run: |
          echo "account_id=${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_OUTPUT

  install-dependencies:
    runs-on: ubuntu-latest
    needs: set-variables
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: |
          cd app/backend
          npm ci

      - run: |
          cd app/frontend
          npm ci

  sonar-scan:
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=jonnamohit_Terraform
            -Dsonar.organization=jonnamohit
            -Dsonar.sources=app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - run: echo "Quality Gate Passed"

  install-tools:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: docker/setup-buildx-action@v3

  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: install-tools
    steps:
      - uses: actions/checkout@v4

      # AWS LOGIN
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Get Account ID from AWS (IMPORTANT FIX)
      - name: Get AWS Account ID
        id: acct
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # Login to ECR
      - uses: aws-actions/amazon-ecr-login@v2

      # Build & Push (FIXED PART)
      - name: Build and Push Docker Image
        run: |
          ACCOUNT_ID=${{ steps.acct.outputs.account_id }}
          ECR_URL=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/demo-1

          docker build -t demo-1:$IMAGE_TAG .
          docker tag demo-1:$IMAGE_TAG $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:$IMAGE_TAG

  eks-connect:
    runs-on: self-hosted
    needs: docker-build-scan-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
          kubectl get nodes

  helm-deploy:
    runs-on: self-hosted
    needs: eks-connect
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Helm Deploy
        run: |
          ACCOUNT_ID=${{ needs.docker-build-scan-push.outputs.account_id }}

          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
          kubectl create namespace $HELM_NAMESPACE || true
          helm upgrade --install $APP_NAME $HELM_CHART_PATH \
            --set image.repository=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/demo-1 \
            --set image.tag=$IMAGE_TAG

  smoke-test:
    runs-on: ubuntu-latest
    needs: helm-deploy
    steps:
      - run: echo "Smoke Test Passed"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [sonar-scan, docker-build-scan-push, helm-deploy]
    if: failure()
    steps:
      - run: echo "Pipeline failed"