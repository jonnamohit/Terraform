name: EKS DevOps Pipeline

on:
  push:
    branches:
      - Pipeline1 

jobs:
  deploy:
    runs-on: self-hosted

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-south-2

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $AWS_REGION

      - name: Create Terraform State Bucket
        run: |
          aws s3api head-bucket --bucket my-terraform-state-mohit-987654 2>/dev/null || \
          aws s3api create-bucket \
            --bucket my-terraform-state-mohit-987654 \
            --region ap-south-2 \
            --create-bucket-configuration LocationConstraint=ap-south-2

      - name: Terraform Init
        run: terraform init
        working-directory: env/dev

      - name: Terraform Plan
        run: terraform plan
        working-directory: env/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: env/dev


