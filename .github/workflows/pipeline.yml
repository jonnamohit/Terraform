name: EKS DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Cache Terraform Plugins
        uses: actions/cache@v3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-plugins-${{ hashFiles('.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugins-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Free Disk Space (Clean Runner)
        run: |
          echo "🧹 Cleaning runner disk space..."
          df -h
          echo "---"
          # Remove docker images
          docker image prune -af 2>/dev/null || true
          # Remove docker build cache
          docker builder prune -af 2>/dev/null || true
          # Clean apt cache
          sudo apt-get clean 2>/dev/null || true
          # Remove old terraform
          rm -rf ~/.terraform.d/plugin-cache/* 2>/dev/null || true
          rm -rf /tmp/* 2>/dev/null || true
          # Create cache directory
          mkdir -p ~/.terraform.d/plugin-cache
          echo "✅ After cleanup:"
          df -h

      - name: Terraform Init
        run: terraform init
        working-directory: env/dev
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Terraform Validate
        run: terraform validate
        working-directory: env/dev

      - name: Terraform Destroy (Clean Old Infrastructure)
        if: github.ref == 'refs/heads/main'
        run: terraform destroy -auto-approve -var-file=terraform.tfvars
        working-directory: env/dev
        continue-on-error: true

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars
        working-directory: env/dev

      - name: Terraform Apply (Fresh Infrastructure)
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        working-directory: env/dev

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-south-2 --name demo-eks

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f app/deployment.yaml
          kubectl apply -f app/service.yaml

      - name: Verify Deployment
        run: |
          kubectl get pods -n default
          kubectl get svc -n default
