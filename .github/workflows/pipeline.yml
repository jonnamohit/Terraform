name: EKS DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VAR_FILE: terraform.tfvars
  AWS_REGION: ap-south-2
  PROJECT_NAME: demo

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Free Disk Space (Clean Runner)
        run: |
          echo "🧹 Aggressive disk cleanup for GitHub Actions runner..."
          df -h
          echo "---"
          
          # Stop docker to free space
          sudo systemctl stop docker 2>/dev/null || true
          
          # Remove all docker data
          sudo rm -rf /var/lib/docker/* 2>/dev/null || true
          
          # Clean apt cache
          sudo apt-get clean 2>/dev/null || true
          sudo apt-get autoclean 2>/dev/null || true
          
          # Remove unnecessary tools
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /usr/share/swift 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          
          # Clear logs
          sudo rm -rf /var/log/* 2>/dev/null || true
          
          # Clear /tmp completely
          sudo rm -rf /tmp/* 2>/dev/null || true
          sudo rm -rf /var/tmp/* 2>/dev/null || true
          
          # Clear package cache
          sudo apt-get clean 2>/dev/null || true
          
          echo "✅ After cleanup:"
          df -h

      - name: Check for terraform.tfvars
        run: |
          if [ ! -f "env/dev/${{ env.TF_VAR_FILE }}" ]; then
            echo "⚠️  Warning: env/dev/${{ env.TF_VAR_FILE }} not found. Creating from sample..."
            echo 'project_name     = "${{ env.PROJECT_NAME }}"' > env/dev/${{ env.TF_VAR_FILE }}
            echo 'aws_region       = "${{ env.AWS_REGION }}"' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 'vpc_cidr         = "10.0.0.0/16"' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 'public_subnets_cidr  = ["10.0.1.0/24"]' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 'private_subnets_cidr = ["10.0.2.0/24", "10.0.3.0/24"]' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 'azs              = ["${{ env.AWS_REGION }}a", "${{ env.AWS_REGION }}b"]' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 'instance_types   = ["t3.micro"]' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 's3_bucket_name   = "my-lb-logs-${{ env.PROJECT_NAME }}-12345"' >> env/dev/${{ env.TF_VAR_FILE }}
            echo 'my_ip            = "0.0.0.0/0"' >> env/dev/${{ env.TF_VAR_FILE }}
          fi

      - name: Pre-Cleanup Orphaned AWS Resources
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🧹 Pre-cleanup: Removing orphaned AWS resources that block Terraform..."
          
          REGION="${{ env.AWS_REGION }}"
          PROJECT="${{ env.PROJECT_NAME }}"
          
          safe_delete() {
            echo "  → $1"
            eval "$2" 2>/dev/null || echo "     (not found or already deleted)"
          }
          
          # 1. Delete EKS Node Groups first (must delete before cluster)
          echo ""
          echo "1. Checking for EKS Node Groups..."
          NODE_GROUPS=$(aws eks list-nodegroups --cluster-name ${PROJECT}-eks --region $REGION --query 'nodegroups[*]' --output text 2>/dev/null || echo "")
          for ng in $NODE_GROUPS; do
            safe_delete "Deleting node group: $ng" \
              "aws eks delete-nodegroup --cluster-name ${PROJECT}-eks --nodegroup-name $ng --region $REGION"
            echo "   Waiting for node group deletion..."
            aws eks wait nodegroup-deleted --cluster-name ${PROJECT}-eks --nodegroup-name $ng --region $REGION 2>/dev/null || true
          done
          
          # 2. Delete EKS Cluster
          echo ""
          echo "2. Checking for EKS Cluster..."
          safe_delete "Deleting EKS cluster" \
            "aws eks delete-cluster --name ${PROJECT}-eks --region $REGION"
          
          # 3. Detach and Delete IAM Roles
          echo ""
          echo "3. Checking for IAM Roles..."
          
          safe_delete "Detaching policies from ${PROJECT}-eks-cluster-role" \
            "aws iam detach-role-policy --role-name ${PROJECT}-eks-cluster-role --policy-arn arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
          safe_delete "Deleting ${PROJECT}-eks-cluster-role" \
            "aws iam delete-role --role-name ${PROJECT}-eks-cluster-role"
          
          for policy in \
            arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy \
            arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly \
            arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy; do
            safe_delete "Detaching $policy from ${PROJECT}-eks-node-role" \
              "aws iam detach-role-policy --role-name ${PROJECT}-eks-node-role --policy-arn $policy"
          done
          safe_delete "Deleting ${PROJECT}-eks-node-role" \
            "aws iam delete-role --role-name ${PROJECT}-eks-node-role"
          
          # 4. Delete ALB and Target Groups
          echo ""
          echo "4. Checking for ALB and Target Groups..."
          ALB_ARN=$(aws elbv2 describe-load-balancers --region $REGION --names "${PROJECT}-alb" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
          if [ "$ALB_ARN" != "None" ] && [ -n "$ALB_ARN" ]; then
            safe_delete "Deleting ALB" \
              "aws elbv2 delete-load-balancer --load-balancer-arn $ALB_ARN --region $REGION"
            sleep 30
          fi
          
          TG_ARN=$(aws elbv2 describe-target-groups --region $REGION --names "${PROJECT}-tg" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
          if [ "$TG_ARN" != "None" ] && [ -n "$TG_ARN" ]; then
            safe_delete "Deleting Target Group" \
              "aws elbv2 delete-target-group --target-group-arn $TG_ARN --region $REGION"
          fi
          
          # 5. Delete S3 Bucket
          echo ""
          echo "5. Checking for S3 Bucket..."
          safe_delete "Deleting S3 bucket" \
            "aws s3 rb s3://my-lb-logs-${PROJECT}-12345 --force"
          
          # 6. Delete Security Group
          echo ""
          echo "6. Checking for Security Groups..."
          SG_ID=$(aws ec2 describe-security-groups --region $REGION --filters "Name=group-name,Values=allow-my-ip" --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
          if [ "$SG_ID" != "None" ] && [ -n "$SG_ID" ]; then
            safe_delete "Deleting security group $SG_ID" \
              "aws ec2 delete-security-group --group-id $SG_ID --region $REGION"
          fi
          
          # 7. Delete VPC and all dependencies
          echo ""
          echo "7. Checking for VPC and dependencies..."
          VPC_ID=$(aws ec2 describe-vpcs --region $REGION --filters "Name=tag:Name,Values=${PROJECT}-vpc" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          
          if [ "$VPC_ID" != "None" ] && [ -n "$VPC_ID" ]; then
            echo "   Found VPC: $VPC_ID"
            
            NAT_IDS=$(aws ec2 describe-nat-gateways --region $REGION --filter Name=vpc-id,Values=$VPC_ID --query 'NatGateways[?State!="deleted"].NatGatewayId' --output text 2>/dev/null || echo "")
            for nat_id in $NAT_IDS; do
              safe_delete "Deleting NAT Gateway: $nat_id" \
                "aws ec2 delete-nat-gateway --nat-gateway-id $nat_id --region $REGION"
            done
            
            if [ -n "$NAT_IDS" ]; then
              echo "   Waiting for NAT gateways to delete (30s)..."
              sleep 30
            fi
            
            EIP_ALLOC_IDS=$(aws ec2 describe-addresses --region $REGION --filters "Name=domain,Values=vpc" --query 'Addresses[*].AllocationId' --output text 2>/dev/null || echo "")
            for eip in $EIP_ALLOC_IDS; do
              safe_delete "Releasing Elastic IP: $eip" \
                "aws ec2 release-address --allocation-id $eip --region $REGION"
            done
            
            IGW_IDS=$(aws ec2 describe-internet-gateways --region $REGION --filters "Name=attachment.vpc-id,Values=$VPC_ID" --query 'InternetGateways[*].InternetGatewayId' --output text 2>/dev/null || echo "")
            for igw in $IGW_IDS; do
              safe_delete "Detaching/Deleting IGW: $igw" \
                "aws ec2 detach-internet-gateway --internet-gateway-id $igw --vpc-id $VPC_ID --region $REGION && aws ec2 delete-internet-gateway --internet-gateway-id $igw --region $REGION"
            done
            
            SUBNET_IDS=$(aws ec2 describe-subnets --region $REGION --filters "Name=vpc-id,Values=$VPC_ID" --query 'Subnets[*].SubnetId' --output text 2>/dev/null || echo "")
            for subnet in $SUBNET_IDS; do
              safe_delete "Deleting subnet: $subnet" \
                "aws ec2 delete-subnet --subnet-id $subnet --region $REGION"
            done
            
            RT_IDS=$(aws ec2 describe-route-tables --region $REGION --filters "Name=vpc-id,Values=$VPC_ID" --query 'RouteTables[?Associations[0].Main != `true`].RouteTableId' --output text 2>/dev/null || echo "")
            for rt in $RT_IDS; do
              safe_delete "Deleting route table: $rt" \
                "aws ec2 delete-route-table --route-table-id $rt --region $REGION"
            done
            
            safe_delete "Deleting VPC: $VPC_ID" \
              "aws ec2 delete-vpc --vpc-id $VPC_ID --region $REGION"
          fi
          
          echo ""
          echo "✅ Pre-cleanup complete!"

      - name: Terraform Init
        run: terraform init
        working-directory: env/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: env/dev

      - name: Terraform Destroy (With Proper Error Handling)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🗑️  Running Terraform destroy..."
          
          if terraform destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}; then
            echo "✅ Terraform destroy succeeded"
          else
            echo "⚠️  Terraform destroy failed or no state exists"
            echo "   This is OK if pre-cleanup already removed everything"
          fi
          
          rm -f terraform.tfstate terraform.tfstate.backup
          echo "✅ State files cleaned"
        working-directory: env/dev

      - name: Terraform Plan
        run: terraform plan -var-file=${{ env.TF_VAR_FILE }}
        working-directory: env/dev

      - name: Terraform Apply (Fresh Infrastructure)
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}
        working-directory: env/dev

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.PROJECT_NAME }}-eks

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f app/deployment.yaml
          kubectl apply -f app/service.yaml

      - name: Verify Deployment
        run: |
          echo "📋 Pods:"
          kubectl get pods -n default
          echo ""
          echo "📋 Services:"
          kubectl get svc -n default
          echo ""
          echo "📋 Nodes:"
          kubectl get nodes

