name: EKS DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Free Disk Space (Clean Runner)
        run: |
          echo "🧹 Aggressive disk cleanup for GitHub Actions runner..."
          df -h
          echo "---"
          
          # Stop docker to free space
          sudo systemctl stop docker 2>/dev/null || true
          
          # Remove all docker data
          sudo rm -rf /var/lib/docker/* 2>/dev/null || true
          
          # Clean apt cache
          sudo apt-get clean 2>/dev/null || true
          sudo apt-get autoclean 2>/dev/null || true
          
          # Remove unnecessary tools
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /usr/share/swift 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          
          # Clear logs
          sudo rm -rf /var/log/* 2>/dev/null || true
          
          # Clear /tmp completely
          sudo rm -rf /tmp/* 2>/dev/null || true
          sudo rm -rf /var/tmp/* 2>/dev/null || true
          
          # Clear package cache
          sudo apt-get clean 2>/dev/null || true
          
          echo "✅ After cleanup:"
          df -h

      - name: Terraform Init
        run: terraform init
        working-directory: env/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: env/dev

      - name: Terraform Destroy (Clean Old Infrastructure)
        if: github.ref == 'refs/heads/main'
        run: terraform destroy -auto-approve -var-file=terraform.tfvars
        working-directory: env/dev
        continue-on-error: true

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars
        working-directory: env/dev

      - name: Terraform Apply (Fresh Infrastructure)
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        working-directory: env/dev

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-south-2 --name demo-eks

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f app/deployment.yaml
          kubectl apply -f app/service.yaml

      - name: Verify Deployment
        run: |
          kubectl get pods -n default
          kubectl get svc -n default
